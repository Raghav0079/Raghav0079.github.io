<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raghav Mishra | 3D Interactive Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #000000, #1a0033, #000000);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        
        .redirect-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 102, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #ff0066;
            margin-bottom: 20px;
        }
        
        p {
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        .btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, #ff0066, #6600ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 102, 0.4);
        }
    </style>
    <script>
        // Auto redirect after 3 seconds
        setTimeout(() => {
            window.location.href = '3d-portfolio.html';
        }, 3000);
    </script>
</head>
<body>
    <div class="redirect-container">
        <h1>Welcome to My  Portfolio!</h1>
        <p>You're being redirected to the new  interactive experience...</p>
        <a href="3d-portfolio.html" class="btn">Enter Now</a>
    </div>
</body>
</html>
